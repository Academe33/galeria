<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fala Mike — Carrossel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0D0B14; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .gallery-wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

  .slides { display: flex; width: 100vw; height: 100vh; transition: transform 0.45s cubic-bezier(0.77,0,0.18,1); }

  .slide { min-width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

  .slide img { width: 100%; height: 100%; object-fit: contain; }

  /* Nav arrows */
  .nav { position: fixed; top: 50%; transform: translateY(-50%); z-index: 100; background: rgba(115,51,255,0.25); border: 1.5px solid rgba(115,51,255,0.5); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
  .nav:active { background: rgba(115,51,255,0.6); }
  .nav.left { left: 12px; }
  .nav.right { right: 12px; }
  .nav svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Dots */
  .dots { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer; }
  .dot.active { background: #7333FF; width: 24px; border-radius: 4px; }

  /* Counter */
  .counter { position: fixed; top: 20px; right: 20px; color: rgba(255,255,255,0.5); font-size: 13px; z-index: 100; letter-spacing: 1px; }

  /* Download button */
  .download-btn { position: fixed; top: 16px; left: 16px; z-index: 100; background: rgba(115,51,255,0.2); border: 1.5px solid rgba(115,51,255,0.5); border-radius: 24px; padding: 8px 16px; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .download-btn svg { width: 16px; height: 16px; fill: none; stroke: #7333FF; stroke-width: 2; stroke-linecap: round; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-img { max-width: 90vw; max-height: 75vh; border-radius: 12px; }
  .modal-close { color: #fff; font-size: 15px; background: rgba(115,51,255,0.3); border: 1px solid rgba(115,51,255,0.5); border-radius: 24px; padding: 10px 28px; cursor: pointer; }
  .modal-hint { color: rgba(255,255,255,0.6); font-size: 12px; text-align: center; padding: 0 24px; }
</style>
</head>
<body>

<div class="gallery-wrap">
  <div class="slides" id="slides">
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/45d767a35_generated_image.png" alt="Slide 1"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/8473fd150_generated_image.png" alt="Slide 2"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/9f722ebca_generated_image.png" alt="Slide 3"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/95e279fa6_generated_image.png" alt="Slide 4"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/568a6639e_generated_image.png" alt="Slide 5"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/8491d80c5_generated_image.png" alt="Slide 6"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/8fae706f4_generated_image.png" alt="Slide 7"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/eef096b2d_generated_image.png" alt="Slide 8"></div>
    <div class="slide"><img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/f83bd2d68_generated_image.png" alt="Slide 9"></div>
  </div>
</div>

<!-- Arrows -->
<div class="nav left" onclick="move(-1)">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</div>
<div class="nav right" onclick="move(1)">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</div>

<!-- Dots -->
<div class="dots" id="dots"></div>

<!-- Counter -->
<div class="counter" id="counter">1 / 9</div>

<!-- Download -->
<div class="download-btn" onclick="openModal()">
  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  Salvar
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <img class="modal-img" id="modal-img" src="" alt="">
  <p class="modal-hint">📱 Pressione e segure a imagem para salvar</p>
  <div class="modal-close" onclick="closeModal()">Fechar</div>
</div>

<script>
  const slides = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  const counter = document.getElementById('counter');
  const total = 9;
  let cur = 0;
  let startX = 0;
  let isDragging = false;

  // Build dots
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('onclick', 'goTo(' + i + ')');
    dotsEl.appendChild(d);
  }

  function update() {
    slides.style.transform = 'translateX(-' + (cur * 100) + 'vw)';
    counter.textContent = (cur + 1) + ' / ' + total;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.className = 'dot' + (i === cur ? ' active' : '');
    });
  }

  function move(dir) {
    cur = Math.max(0, Math.min(total - 1, cur + dir));
    update();
  }

  function goTo(i) { cur = i; update(); }

  // Touch / swipe
  slides.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  slides.addEventListener('touchend', function(e) {
    if (!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
    isDragging = false;
  }, { passive: true });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') move(1);
    if (e.key === 'ArrowLeft') move(-1);
  });

  function openModal() {
    const img = document.querySelectorAll('.slide img')[cur];
    document.getElementById('modal-img').src = img.src;
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
