<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Fala Mike — Carrossel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0A;touch-action:manipulation;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;}

#slide-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;}
#slide-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity 0.2s ease;}

#counter{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(115,51,255,0.25);color:#fff;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;z-index:100;pointer-events:none;letter-spacing:1px;}

#dots{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:100;pointer-events:none;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.2s;}
.dot.active{background:#7333FF;transform:scale(1.4);}

#label{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-size:11px;pointer-events:none;z-index:100;white-space:nowrap;}

#arrow-l,#arrow-r{position:fixed;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2);font-size:32px;pointer-events:none;z-index:2;}
#arrow-l{left:10px;}
#arrow-r{right:10px;}

#btnL,#btnR{position:fixed;top:0;height:85%;width:46%;z-index:999;background:rgba(0,0,0,0.001);border:none;cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation;min-width:44px;min-height:44px;}
#btnL{left:0;}
#btnR{right:0;}
</style>
</head>
<body>

<div id="counter">1 / 8</div>
<div id="slide-container"><img id="slide-img" src="" alt="Slide"/></div>
<div id="dots"></div>
<div id="label"></div>
<div id="arrow-l">‹</div>
<div id="arrow-r">›</div>
<button id="btnL" onclick="go(cur-1)"></button>
<button id="btnR" onclick="go(cur+1)"></button>

<script>
var slides=[
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/2811e7384_generated_image.png",label:"Slide 1 — Capa"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/08e1b1a50_generated_image.png",label:"Slide 2 — Problema"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/655479209_generated_image.png",label:"Slide 3 — Dado de impacto"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/f739cf368_generated_image.png",label:"Slide 4 — Custo real"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/c40abde7e_generated_image.png",label:"Slide 5 — Ponte"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/dc6a72e4a_generated_image.png",label:"Slide 6 — Solução"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/64dc88daf_generated_image.png",label:"Slide 7 — Prova Social"},
  {url:"https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/b5a0b0b86_generated_image.png",label:"Slide 8 — CTA Final"}
];
var cur=0,tot=slides.length;

var dotsEl=document.getElementById('dots');
for(var i=0;i<tot;i++){var d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.id='dot'+i;dotsEl.appendChild(d);}

function go(n){
  cur=((n%tot)+tot)%tot;
  var img=document.getElementById('slide-img');
  img.style.opacity='0';
  setTimeout(function(){
    img.src=slides[cur].url;img.style.opacity='1';
    document.getElementById('counter').textContent=(cur+1)+' / '+tot;
    document.getElementById('label').textContent=slides[cur].label;
    for(var i=0;i<tot;i++){document.getElementById('dot'+i).className='dot'+(i===cur?' active':'');}
  },150);
}

document.getElementById('slide-img').src=slides[0].url;
document.getElementById('label').textContent=slides[0].label;

var sx=0;
document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40){go(dx<0?cur+1:cur-1);}},{passive:true});
</script>
</body>
</html>
