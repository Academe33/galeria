<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fala Mike — Carrossel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #1a0a2e; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .slides { display: flex; width: 100vw; height: 100vh; transition: transform 0.45s cubic-bezier(0.77,0,0.18,1); will-change: transform; }

  .slide { min-width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .slide img { width: 100%; height: 100%; object-fit: cover; }

  /* Nav arrows */
  .nav { position: fixed; top: 50%; transform: translateY(-50%); z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
  .nav:active { background: rgba(115,51,255,0.5); }
  .nav.left { left: 12px; }
  .nav.right { right: 12px; }
  .nav svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Dots */
  .dots { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 7px; z-index: 100; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.35); transition: all 0.3s; cursor: pointer; }
  .dot.active { background: #fff; width: 22px; border-radius: 4px; }

  /* Counter */
  .counter { position: fixed; top: 18px; right: 18px; color: rgba(255,255,255,0.7); font-size: 13px; z-index: 100; letter-spacing: 1px; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); padding: 4px 10px; border-radius: 20px; }

  /* Download button */
  .download-btn { position: fixed; top: 14px; left: 14px; z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 24px; padding: 8px 16px; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .download-btn svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-img { max-width: 92vw; max-height: 72vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-close { color: #fff; font-size: 14px; background: rgba(115,51,255,0.4); border: 1px solid rgba(115,51,255,0.6); border-radius: 24px; padding: 10px 32px; cursor: pointer; }
  .modal-hint { color: rgba(255,255,255,0.55); font-size: 12px; text-align: center; padding: 0 24px; }

  /* Slide number label */
  .slide-label { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); background: rgba(115,51,255,0.7); color: #fff; font-size: 11px; padding: 3px 12px; border-radius: 20px; letter-spacing: 1px; white-space: nowrap; }
</style>
</head>
<body>

<div class="slides" id="slides">
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/dbc2a3325_generated_image.png" alt="Slide 1 — Hook">
    <div class="slide-label">1 / 9 • A culpa não é sua</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/8534af14b_generated_image.png" alt="Slide 2 — Dado">
    <div class="slide-label">2 / 9 • O Problema</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/9dd07f180_generated_image.png" alt="Slide 3 — Verdade">
    <div class="slide-label">3 / 9 • A Verdade</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/e1ef6382f_generated_image.png" alt="Slide 4 — 22 Dias">
    <div class="slide-label">4 / 9 • 22 Dias</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/04662c32f_generated_image.png" alt="Slide 5 — Salário">
    <div class="slide-label">5 / 9 • 61% a mais</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/b1cefe864_generated_image.png" alt="Slide 6 — Como Funciona">
    <div class="slide-label">6 / 9 • Como Funciona</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/80ab128d3_generated_image.png" alt="Slide 7 — Depoimento">
    <div class="slide-label">7 / 9 • Ana C.</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/407d43652_generated_image.png" alt="Slide 8 — Garantia">
    <div class="slide-label">8 / 9 • 7 dias sem risco</div>
  </div>
  <div class="slide">
    <img src="https://media.base44.com/images/public/69b31c93e0ddd0abcd7d5ae9/c3bc38cb9_generated_image.png" alt="Slide 9 — CTA">
    <div class="slide-label">9 / 9 • Comece agora</div>
  </div>
</div>

<!-- Arrows -->
<div class="nav left" onclick="move(-1)">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</div>
<div class="nav right" onclick="move(1)">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</div>

<!-- Dots -->
<div class="dots" id="dots"></div>

<!-- Counter -->
<div class="counter" id="counter">1 / 9</div>

<!-- Download -->
<div class="download-btn" onclick="openModal()">
  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  Salvar
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <img class="modal-img" id="modal-img" src="" alt="">
  <p class="modal-hint">📱 Pressione e segure a imagem para salvar no celular</p>
  <div class="modal-close" onclick="closeModal()">Fechar</div>
</div>

<script>
  const slidesEl = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  const counter = document.getElementById('counter');
  const total = 9;
  let cur = 0;
  let startX = 0;

  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('onclick', 'goTo(' + i + ')');
    dotsEl.appendChild(d);
  }

  function update() {
    slidesEl.style.transform = 'translateX(-' + (cur * 100) + 'vw)';
    counter.textContent = (cur + 1) + ' / ' + total;
    document.querySelectorAll('.dot').forEach(function(d, i) {
      d.className = 'dot' + (i === cur ? ' active' : '');
    });
  }

  function move(dir) {
    cur = Math.max(0, Math.min(total - 1, cur + dir));
    update();
  }

  function goTo(i) { cur = i; update(); }

  slidesEl.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
  slidesEl.addEventListener('touchend', function(e) {
    var diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
  }, { passive: true });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') move(1);
    if (e.key === 'ArrowLeft') move(-1);
  });

  function openModal() {
    var img = document.querySelectorAll('.slide img')[cur];
    document.getElementById('modal-img').src = img.src;
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
